name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # package-lock.json is maintained with this exact npm version. Different npm major
      # versions resolve optional peer dependencies differently, which makes `npm ci` reject
      # a lockfile generated by a different npm version as "out of sync" even though nothing
      # about the actual dependencies changed -- pinning avoids that class of false failure.
      - run: npm install -g npm@11.6.2
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
